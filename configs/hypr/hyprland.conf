# ==============================================================================
# JKER OS - Hyprland Window Manager Core Configuration
# Built by Security. Designed for Everyone.
# Reference colors: Crimson (#D90429), Obsidian (#0B0C10), Carbon (#1F2833)
# ==============================================================================

# --- Monitors ---
# Setup default monitor configurations (fallback to automated scaling)
monitor=,preferred,auto,1

# --- Autostart Applications ---
# Start Waybar, notification center, wallpaper daemon, pipewire audio
exec-once = waybar &
exec-once = swaync &
exec-once = swww init && swww img /usr/share/backgrounds/camo_red.jpg &
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &
exec-once = hypridle &

# --- Input Configurations ---
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

# --- General Theme and Layouts ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgb(D90429)
    col.inactive_border = rgb(1F2833)
    layout = dwindle
    allow_tearing = false
}

# --- Window Decoration ---
decoration {
    rounding = 8
    active_opacity = 0.95
    inactive_opacity = 0.85

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = true
    }

    drop_shadow = true
    shadow_range = 10
    shadow_render_power = 3
    col.shadow = rgba(111111ee)
}

# --- Workspace & Window Animations ---
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# --- Layout Configuration ---
dwindle {
    pseudotile = true
    preserve_split = true
}

# --- Window Rules ---
# Float custom PyQt6 applications by default and position centrally
windowrulev2 = float, class:^(blackvault\.py|sentryops\.py|downloadcenter\.py|controlcenter\.py)$
windowrulev2 = size 950 650, class:^(blackvault\.py|sentryops\.py|downloadcenter\.py|controlcenter\.py)$
windowrulev2 = center, class:^(blackvault\.py|sentryops\.py|downloadcenter\.py|controlcenter\.py)$
windowrulev2 = bordercolor rgb(D90429), class:^(blackvault\.py|sentryops\.py|downloadcenter\.py|controlcenter\.py)$

# --- Key Bindings ---
$mainMod = SUPER

# System Control Bindings
bind = $mainMod, Q, exec, kitty
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, thunar
bind = $mainMod, V, togglefloat,
bind = $mainMod, R, exec, rofi -show drun

# Custom Native Applications Bindings
bind = $mainMod, B, exec, python3 /usr/bin/blackvault
bind = $mainMod, S, exec, python3 /usr/bin/sentryops
bind = $mainMod, D, exec, python3 /usr/bin/downloadcenter
bind = $mainMod, P, exec, python3 /usr/bin/controlcenter

# Focus Workspace bindings
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Volume and Brightness Keys (Fn Keys)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
