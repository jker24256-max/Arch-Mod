# ==============================================================================
# JKER OS - Kitty Terminal Configuration
# Designed for Obsidian dark (#0B0C10) and Crimson (#D90429) details.
# ==============================================================================

# Font Styling
font_family      Courier New
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Window customization
window_padding_width 10
background_opacity 0.90

# Cursor settings
cursor #D90429
cursor_text_color #0B0C10
cursor_shape block
shell_integration no-cursor

# Scrollback
scrollback_lines 10000

# Copy / Paste bindings
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Standard Color Palette (Obsidian Dark with Crimson Highlights)
background #0B0C10
foreground #EDF2F4

# Black
color0 #151A21
color8 #1F2833

# Red
color1 #D90429
color9 #EF233C

# Green
color2 #2ECC71
color10 #2ECC71

# Yellow
color3 #F1C40F
color11 #F1C40F

# Blue
color4 #3498DB
color12 #3498DB

# Magenta
color5 #9B59B6
color13 #9B59B6

# Cyan
color6 #1ABC9C
color14 #1ABC9C

# White
color7 #8D99AE
color15 #EDF2F4
