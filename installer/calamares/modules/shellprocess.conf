# ==============================================================================
# JKER OS - Calamares Shellprocess Installer Integration
# Copies JKER applications, scripts, and skel files to target partition.
# ==============================================================================

dontChroot: true
timeout: 300

script:
  - description: "Deploying JKER OS Custom Applications..."
    command: "rsync -a /usr/share/jker-apps/ ${ROOT}/usr/share/jker-apps/"
  - command: "rsync -a /usr/bin/blackvault /usr/bin/sentryops /usr/bin/downloadcenter /usr/bin/controlcenter ${ROOT}/usr/bin/"
  - command: "rsync -a /usr/bin/jker-hwdetect /usr/bin/jker-optimize /usr/bin/jker-syssetup ${ROOT}/usr/bin/"
  - description: "Applying User Theme Configurations..."
    command: "rsync -a /etc/skel/ ${ROOT}/etc/skel/"
  - description: "Activating Security and Optimization profiles..."
    command: "chroot ${ROOT} /usr/bin/jker-optimize"
