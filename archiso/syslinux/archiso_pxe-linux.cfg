LABEL arch64_nbd
  MENU LABEL JKER OS Live Environment (x86_64, PXE, NBD)
  LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% archiso_nbd_srv=${pxeserver} cow_spacesize=10G copytoram=n

LABEL arch64_nfs
  MENU LABEL JKER OS Live Environment (x86_64, PXE, NFS)
  LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% archiso_nfs_srv=${pxeserver}:/run/archiso/bootmnt cow_spacesize=10G copytoram=n

LABEL arch64_http
  MENU LABEL JKER OS Live Environment (x86_64, PXE, HTTP)
  LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% archiso_http_srv=http://${pxeserver}/ cow_spacesize=10G copytoram=n
