LABEL arch64
  MENU LABEL JKER OS Live Environment (x86_64, BIOS)
  LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=10G copytoram=n

LABEL arch64safe
  MENU LABEL JKER OS Live Environment (x86_64, BIOS, Safe Graphics)
  LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% nomodeset cow_spacesize=10G copytoram=n
